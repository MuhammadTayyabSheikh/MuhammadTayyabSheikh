name: Generate profile assets

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: checkout github-readme-stats
        uses: actions/checkout@v4
        with:
          repository: anuraghazra/github-readme-stats
          path: github-readme-stats

      # The public github-readme-stats instance is rate-limited and often
      # unreachable from CI, so render the cards locally instead.
      - name: render stats cards
        continue-on-error: true
        working-directory: github-readme-stats
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          node express.js &
          until curl -s -o /dev/null "http://localhost:9000/api"; do sleep 2; done
          curl -sfS -o ../dist/stats.svg \
            "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&theme=transparent&title_color=58A6FF&icon_color=BC8CFF&text_color=9FA6B2&hide_border=true&rank_icon=github"
          curl -sfS -o ../dist/top-langs.svg \
            "http://localhost:9000/api/top-langs?username=${{ github.repository_owner }}&layout=compact&theme=transparent&title_color=58A6FF&text_color=9FA6B2&hide_border=true&langs_count=8"
          ! grep -l "Something went wrong" ../dist/stats.svg ../dist/top-langs.svg

      - name: push assets to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
