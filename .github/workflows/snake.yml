name: Generate profile assets

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: checkout github-readme-stats
        uses: actions/checkout@v4
        with:
          repository: anuraghazra/github-readme-stats
          path: github-readme-stats

      # The public github-readme-stats instance is rate-limited and often
      # unreachable from CI, so render the cards locally instead.
      - name: render stats cards
        continue-on-error: true
        working-directory: github-readme-stats
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          node express.js &
          until curl -s -o /dev/null "http://localhost:9000/api"; do sleep 2; done
          dark="theme=transparent&title_color=58A6FF&icon_color=BC8CFF&text_color=9FA6B2&hide_border=true"
          light="theme=transparent&title_color=0969DA&icon_color=8250DF&text_color=57606A&hide_border=true"
          curl -sfS -o ../dist/stats.svg \
            "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&rank_icon=github&include_all_commits=true&count_private=true&$dark"
          curl -sfS -o ../dist/stats-light.svg \
            "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&rank_icon=github&include_all_commits=true&count_private=true&$light"
          curl -sfS -o ../dist/top-langs.svg \
            "http://localhost:9000/api/top-langs?username=${{ github.repository_owner }}&layout=compact&langs_count=8&$dark"
          curl -sfS -o ../dist/top-langs-light.svg \
            "http://localhost:9000/api/top-langs?username=${{ github.repository_owner }}&layout=compact&langs_count=8&$light"
          ! grep -l "Something went wrong" ../dist/stats.svg ../dist/stats-light.svg ../dist/top-langs.svg ../dist/top-langs-light.svg

      - name: generate 3D contribution graph
        continue-on-error: true
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: collect 3D graphs
        continue-on-error: true
        run: cp profile-3d-contrib/*.svg dist/

      - name: push assets to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
